    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async function () {
        const SUPABASE_URL = "https://fxonhdpebaatwixwjlwj.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_CeEj5yl1znEzDCSc2jsWVA_1VFqID8A";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const signedInEls = document.querySelectorAll('.signed-in');
        const signedOutEls = document.querySelectorAll('.signed-out');

        let isLoggedIn = false;

        function updateUI(session) {
          isLoggedIn = !!(session && session.user);

          if (isLoggedIn) {
            signedInEls.forEach(el => el.classList.remove('d-none'));
            signedOutEls.forEach(el => el.classList.add('d-none'));
          } else {
            signedInEls.forEach(el => el.classList.add('d-none'));
            signedOutEls.forEach(el => el.classList.remove('d-none'));
          }
        }

        // Initial session check
        const { data: { session } } = await supabase.auth.getSession();
        updateUI(session);

        // React to login/logout
        supabase.auth.onAuthStateChange((event, session) => {
          updateUI(session);
        });

        // Handle ALL sign-out buttons
        document.querySelectorAll('[href="index.html"][onclick]').forEach(el => {
          el.removeAttribute('onclick'); // remove localStorage logic
          el.addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            localStorage.clear();
            window.location.href = "index.html";
          });
        });
      });
    </script>
