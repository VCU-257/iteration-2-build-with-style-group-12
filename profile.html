    <h1 class="mb-4">User Profile</h1>

  <!-- Profile Card -->
  <div class="card mb-4">
    <div class="card-body">

      <h5>Account Info</h5>

      <p><strong>Email:</strong> <span id="email"></span></p>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input id="username" class="form-control" placeholder="Set username">
        <button class="btn btn-primary mt-2" id="saveUsername">Save Username</button>
      </div>

      <div class="mb-3">
        <label class="form-label">Goals</label>
        <textarea id="goals" class="form-control" rows="3" readonly></textarea>
      </div>

    </div>
  </div>

  <!-- Email Change -->
  <div class="card mb-4">
    <div class="card-body">
      <h5>Change Email</h5>

      <input id="newEmail" class="form-control mb-2" placeholder="New email">
      <button class="btn btn-warning" id="changeEmail">Update Email</button>
    </div>
  </div>

  <!-- Password Reset -->
  <div class="card mb-4">
    <div class="card-body">
      <h5>Reset Password</h5>
      <button class="btn btn-danger" id="resetPassword">
        Send Password Reset Email
      </button>
    </div>
  </div>
